# ============================================================
# Workspace y Seguridad pnpm - Frontend
# ============================================================

# Lista EXPLÍCITA de paquetes que pueden ejecutar lifecycle scripts
# (preinstall, postinstall, etc.). Solo agrega paquetes de confianza.
# Esto bloquea la ejecución de código malicioso en la instalación.
allowBuilds:
  '0': sharp
  '1': esbuild
  '2': '@parcel/watcher'
  '3': canvas
  '@parcel/watcher': true
  '@swc/core': true
  core-js: true
  esbuild: true
  sharp: true
  unrs-resolver: true
